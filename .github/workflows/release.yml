name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sidecars:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform-key: win32-x64
            cargo-target: ""
            rust-targets: ""
            exe: ".exe"
            icon-name: codex-plus-plus.ico
            icon-source: apps/codex-plus-manager/src-tauri/icons/icon.ico
          - os: macos-14
            platform-key: darwin-arm64
            cargo-target: aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
            exe: ""
            icon-name: codex-plus-plus.png
            icon-source: apps/codex-plus-manager/src-tauri/icons/icon.png
          - os: macos-15-intel
            platform-key: darwin-x64
            cargo-target: x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
            exe: ""
            icon-name: codex-plus-plus.png
            icon-source: apps/codex-plus-manager/src-tauri/icons/icon.png
          - os: ubuntu-latest
            platform-key: linux-x64
            cargo-target: ""
            rust-targets: ""
            exe: ""
            icon-name: ""
            icon-source: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout wrapper
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.rust-targets == ''

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.rust-targets != ''
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Resolve upstream release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p upstream-bin
          python -c "from codex_plus_plus_launcher.upstream_release import write_latest_release_json; write_latest_release_json('upstream-bin/upstream-release.json')"
          python - <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          from pathlib import Path

          payload = json.load(open("upstream-bin/upstream-release.json", encoding="utf-8"))
          package_version = json.loads(Path("package.json").read_text(encoding="utf-8"))["version"]
          upstream_ref = os.environ.get("CODEXPP_UPSTREAM_REF") or payload.get("ref") or payload.get("version") or payload.get("tag") or payload.get("upstream_version") or f"v{package_version}"
          payload["ref"] = upstream_ref
          payload["package_version"] = package_version
          Path("upstream-bin/upstream-release.json").write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          print(f"CODEXPP_UPSTREAM_REF={upstream_ref}")
          PY

      - name: Checkout upstream Codex++
        shell: bash
        run: git clone --depth 1 --branch "${CODEXPP_UPSTREAM_REF}" https://github.com/BigPizzaV3/CodexPlusPlus.git upstream

      - name: Apply Codex++ plugin unlock patch
        shell: bash
        run: |
          git -C upstream apply --check ../patches/codex-plus-plus-plugin-unlock.patch
          git -C upstream apply ../patches/codex-plus-plus-plugin-unlock.patch

      - name: Build upstream frontend
        if: matrix.platform-key != 'linux-x64'
        working-directory: upstream/apps/codex-plus-manager
        run: |
          npm install --package-lock=false
          npm run vite:build

      - name: Build upstream binaries
        shell: bash
        working-directory: upstream
        run: |
          package_args=()
          if [ "${{ matrix.platform-key }}" = "linux-x64" ]; then
            package_args=(-p codex-plus-launcher)
          fi
          if [ -n "${{ matrix.cargo-target }}" ]; then
            cargo build --release --target "${{ matrix.cargo-target }}" "${package_args[@]}"
          else
            cargo build --release "${package_args[@]}"
          fi

      - name: Stage sidecars
        shell: bash
        run: |
          mkdir -p "artifact/upstream-bin/${{ matrix.platform-key }}"
          if [ -n "${{ matrix.cargo-target }}" ]; then
            binary_dir="upstream/target/${{ matrix.cargo-target }}/release"
          else
            binary_dir="upstream/target/release"
          fi
          cp "${binary_dir}/codex-plus-plus${{ matrix.exe }}" "artifact/upstream-bin/${{ matrix.platform-key }}/codex-plus-plus${{ matrix.exe }}"
          if [ "${{ matrix.platform-key }}" != "linux-x64" ]; then
            cp "${binary_dir}/codex-plus-plus-manager${{ matrix.exe }}" "artifact/upstream-bin/${{ matrix.platform-key }}/codex-plus-plus-manager${{ matrix.exe }}"
            cp "upstream/${{ matrix.icon-source }}" "artifact/upstream-bin/${{ matrix.platform-key }}/${{ matrix.icon-name }}"
          fi
          cp "upstream-bin/upstream-release.json" "artifact/upstream-bin/upstream-release.json"
          upstream_commit="$(git -C upstream rev-parse HEAD)"
          CODEXPP_UPSTREAM_COMMIT="${upstream_commit}" python - <<'PY'
          import json
          import os
          from pathlib import Path
          path = Path("artifact/upstream-bin/upstream-release.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          payload["commit"] = os.environ["CODEXPP_UPSTREAM_COMMIT"]
          payload["repository"] = "BigPizzaV3/CodexPlusPlus"
          path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: upstream-bin-${{ matrix.platform-key }}
          path: artifact/upstream-bin

  validate:
    needs: build-sidecars
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/download-artifact@v4
        with:
          pattern: upstream-bin-*
          path: upstream-bin
          merge-multiple: true

      - name: Check package versions
        shell: bash
        run: |
          npm_version="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" != "v${npm_version}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match v${npm_version}" >&2
            exit 1
          fi

      - name: Pack npm package
        run: |
          npm run prepack
          npm pack

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-sidecars, validate]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: upstream-bin-*
          path: upstream-bin
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "skip ${name}@${version}"
            exit 0
          fi
          npm run prepack
          npm publish --access public
