name: sync-upstream-wrapper

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-upstream-wrapper
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve upstream version
        id: upstream
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m pip install --upgrade pip
          python -c "from codex_plus_plus_launcher.upstream_release import write_latest_release_json; write_latest_release_json('.github/upstream-release.json')"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          payload = json.loads(Path(".github/upstream-release.json").read_text(encoding="utf-8"))
          upstream_version = str(payload["version"])
          target_version = upstream_version.lstrip("vV")
          if not target_version:
              raise SystemExit("failed to resolve target package version")
          print(f"upstream_version={upstream_version}")
          print(f"target_version={target_version}")
          PY

      - name: Read current package
        id: package
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          current_version="$(node -p "require('./package.json').version")"
          echo "name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"

      - name: Check npm package
        id: npm
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          TARGET_VERSION: ${{ steps.upstream.outputs.target_version }}
        run: |
          if npm view "${PACKAGE_NAME}@${TARGET_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when target version is already published
        if: steps.package.outputs.current_version == steps.upstream.outputs.target_version && steps.npm.outputs.published == 'true'
        shell: bash
        run: |
          echo "${{ steps.package.outputs.name }}@${{ steps.upstream.outputs.target_version }} already published"

      - name: Update wrapper version
        if: steps.package.outputs.current_version != steps.upstream.outputs.target_version
        shell: bash
        env:
          TARGET_VERSION: ${{ steps.upstream.outputs.target_version }}
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.upstream_version }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          target_version = os.environ["TARGET_VERSION"]
          upstream_version = os.environ["UPSTREAM_VERSION"]

          package_json = Path("package.json")
          payload = json.loads(package_json.read_text(encoding="utf-8"))
          payload["version"] = target_version
          package_json.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

          replacements = [
              ("pyproject.toml", r'^version = ".*"$', f'version = "{target_version}"'),
              ("codex_plus_plus_launcher/__init__.py", r'^__version__ = ".*"$', f'__version__ = "{target_version}"'),
          ]
          for relative_path, pattern, replacement in replacements:
              path = Path(relative_path)
              text = path.read_text(encoding="utf-8")
              path.write_text(re.sub(pattern, replacement, text, flags=re.MULTILINE), encoding="utf-8")

          text_test = Path("tests/test_installers_text.py")
          text = text_test.read_text(encoding="utf-8")
          text = re.sub(r'"version": "\d+\.\d+\.\d+"', f'"version": "{target_version}"', text)
          text_test.write_text(text, encoding="utf-8")

          runtime_test = Path("tests/test_runtime.py")
          text = runtime_test.read_text(encoding="utf-8")
          text = re.sub(r'expected_launcher_version == "\d+\.\d+\.\d+"', f'expected_launcher_version == "{target_version}"', text)
          runtime_test.write_text(text, encoding="utf-8")

          metadata_path = Path(".github/upstream-sync/latest.json")
          metadata_path.parent.mkdir(parents=True, exist_ok=True)
          metadata = {
              "upstream_version": upstream_version,
              "package_version": target_version,
          }
          metadata_path.write_text(json.dumps(metadata, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY

      - name: Test wrapper changes
        if: steps.package.outputs.current_version != steps.upstream.outputs.target_version
        run: python -m pytest

      - name: Commit wrapper version
        if: steps.package.outputs.current_version != steps.upstream.outputs.target_version
        shell: bash
        env:
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.upstream_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pyproject.toml codex_plus_plus_launcher/__init__.py tests/test_installers_text.py tests/test_runtime.py .github/upstream-sync/latest.json
          git commit -m "release: sync Codex++ ${UPSTREAM_VERSION}"
          git push origin HEAD:main

      - name: Create release tag
        if: steps.npm.outputs.published != 'true'
        shell: bash
        env:
          CURRENT_VERSION: ${{ steps.package.outputs.current_version }}
          TARGET_VERSION: ${{ steps.upstream.outputs.target_version }}
        run: |
          git fetch --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/v${TARGET_VERSION}" >/dev/null 2>&1; then
            if [ "${CURRENT_VERSION}" != "${TARGET_VERSION}" ]; then
              echo "release tag v${TARGET_VERSION} already exists before this sync" >&2
              exit 1
            fi
          else
            git tag "v${TARGET_VERSION}"
            git push origin "v${TARGET_VERSION}"
          fi

      - name: Publish npm through release workflow
        if: steps.npm.outputs.published != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_VERSION: ${{ steps.upstream.outputs.target_version }}
        run: |
          gh workflow run release.yml --ref "v${TARGET_VERSION}"
